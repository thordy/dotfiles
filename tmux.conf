#
# .tmux.conf
#

# Changes default keys to Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reloading of tmux configuration file on the fly
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded"

# Allow switching panes with mouse
set -g mouse on




# Set the colors
set -g default-terminal "screen-256color"

# Change active panes with Ctrl-ArrowKey
bind-key -n C-S-Up    select-pane -U
bind-key -n C-S-Down  select-pane -D
bind-key -n C-S-Left  select-pane -L
bind-key -n C-S-Right select-pane -R
# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
# Switch windows with shift prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reorder windows with CTRL+Shift+Arrow
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Allows tmux to work on Cygwin
set -sg escape-time 250

# vi copypaste mode
set-window-option -g mode-keys vi

# Set window indices to start at 1
set -g base-index 1

# Inherit default shell
set-option -g default-shell $SHELL

# Automatically rename windows to last command executed
set-window-option -g automatic-rename on

# Set the ssh-agent variables into all tmux sessions
set -g update-environment "SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID"

# Toggle pane synchronization on/off
bind j set-window-option synchronize-panes\; display "Synchronize-panes #{?synchronize-panes,on,off}"

######################
# Design changes
######################
set-option -g status-interval 1

set -g status-fg white
set -g status-bg colour234
set-window-option -g window-status-activity-style "bold"
set-option -g pane-border-style "fg=colour245"
set-option -g pane-active-border-style "fg=colour39"
set-option -g message-style "bold"

set -g window-status-format "#[fg=white,bg=colour234] #I #W "
set -g window-status-current-format "#[fg=colour234,bg=colour39] #[fg=colour244,bg=colour39,noreverse,bold] #I #W #[fg=colour39,bg=colour234,nobold] "

# Setup the statusbar
set -g status-left-length 32
set -g status-left '#[fg=colour235,bg=colour252,bold] ❐ #S #[fg=colour252,bg=colour238,nobold] #[fg=colour245,bg=colour238,bold] #[fg=colour238,bg=colour234,nobold] '
set -g status-right-length 80
set -g status-right '#[fg=colour233,bg=colour245,bold] #{?synchronize-panes,<Synchronized Panes> ,}#(whoami) @ (%Y-%m-%d %H:%M:%S) - #(changestamp tmux)'

# Display prefix in red when prefix key is pressed
set -g status-left '#{?client_prefix,#[bg=colour245 fg=colour233 bold],#[fg=colour155]} (#S)'
